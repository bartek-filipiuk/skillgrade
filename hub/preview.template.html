<!doctype html>
<html lang="pl">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>SkillHub — podgląd (scaffolding)</title>
<style>
  /* Scaffolding only — the real design is produced in Claude Design from CLAUDE_DESIGN.md.
     This exists purely to prove catalog.json renders and to sanity-check the data. */
  :root { --bg:#0f1117; --card:#181b23; --line:#262b36; --fg:#e7e9ee; --mut:#9aa3b2;
          --A:#2ecc71; --B:#8ec63f; --C:#f4c542; --D:#f08a3c; --F:#e5484d; --NE:#5b6373; }
  * { box-sizing:border-box; } body { margin:0; background:var(--bg); color:var(--fg);
     font:15px/1.5 system-ui,-apple-system,Segoe UI,Roboto,sans-serif; }
  header { padding:32px 24px 16px; max-width:1100px; margin:0 auto; }
  h1 { margin:0 0 4px; font-size:28px; } .sub { color:var(--mut); }
  .stats { display:flex; gap:20px; margin-top:16px; flex-wrap:wrap; }
  .stat b { font-size:22px; } .stat span { color:var(--mut); font-size:13px; display:block; }
  .filters { max-width:1100px; margin:8px auto 0; padding:0 24px; display:flex; gap:8px; flex-wrap:wrap; }
  .chip { border:1px solid var(--line); background:var(--card); color:var(--fg); padding:6px 12px;
          border-radius:999px; cursor:pointer; font-size:13px; } .chip.on { background:#2b3242; border-color:#3a4256; }
  main { max-width:1100px; margin:16px auto 60px; padding:0 24px;
         display:grid; grid-template-columns:repeat(auto-fill,minmax(320px,1fr)); gap:16px; }
  .card { background:var(--card); border:1px solid var(--line); border-radius:14px; padding:18px; }
  .card h3 { margin:0 0 2px; font-size:17px; } .cat { color:var(--mut); font-size:12px; text-transform:uppercase; letter-spacing:.05em; }
  .tag { color:var(--mut); font-size:13px; margin:10px 0 14px; }
  .badges { display:flex; gap:8px; margin-bottom:12px; }
  .b { width:34px; height:34px; border-radius:8px; display:grid; place-items:center; font-weight:700; color:#0c0e12; }
  .b span { position:absolute; font-size:9px; margin-top:30px; color:var(--mut); font-weight:400; }
  .bwrap { display:flex; flex-direction:column; align-items:center; }
  .bl { font-size:10px; color:var(--mut); margin-top:3px; }
  .A{background:var(--A)} .B{background:var(--B)} .C{background:var(--C)} .D{background:var(--D)} .F{background:var(--F)} .NE{background:var(--NE);color:var(--fg)}
  .fixture { border-style:dashed; } .fixture .cat::after { content:' · fixture'; color:#6b7280; }
  .hl { border-top:1px solid var(--line); padding-top:10px; margin-top:4px; }
  .hl li { list-style:none; margin:0 0 6px; padding:0; font-size:12.5px; color:var(--mut); }
  .st { font-weight:700; font-size:11px; padding:1px 6px; border-radius:4px; margin-right:6px; }
  .st.pass{color:var(--A)} .st.warning{color:var(--C)} .st.fail{color:var(--F)} .st.na{color:var(--NE)}
  .foot { max-width:1100px; margin:0 auto; padding:0 24px 40px; color:var(--mut); font-size:12px; }
</style>
</head>
<body>
<header>
  <h1>SkillHub <span class="sub">— podgląd danych</span></h1>
  <div class="sub">Oceny i badge generowane automatycznie przez <b>trust-skill</b>. To rusztowanie — finalny design powstaje w Claude Design.</div>
  <div class="stats" id="stats"></div>
</header>
<div class="filters" id="filters"></div>
<main id="grid"></main>
<div class="foot" id="foot"></div>

<script id="catalog" type="application/json">/*CATALOG_JSON*/</script>
<script>
  const cat = JSON.parse(document.getElementById('catalog').textContent);
  const labelOf = id => (cat.taxonomy.find(t=>t.id===id)||{}).label || id;
  const cls = g => g==='not-evaluated' ? 'NE' : g;
  const txt = g => g==='not-evaluated' ? '–' : g;
  const stCls = s => s==='not-applicable'?'na':s;
  let active = 'all';

  const stats = document.getElementById('stats');
  const dist = {A:0,B:0,C:0,D:0,F:0,'not-evaluated':0};
  cat.skills.forEach(s=>dist[s.overall]++);
  stats.innerHTML =
    `<div class="stat"><b>${cat.skills.length}</b><span>ocenionych skilli</span></div>`+
    `<div class="stat"><b>${cat.taxonomy.length}</b><span>kategorii</span></div>`+
    `<div class="stat"><b>${dist.A}</b><span>ocena A</span></div>`+
    `<div class="stat"><b>${dist.F}</b><span>odrzuconych (F)</span></div>`+
    `<div class="stat"><b>v${cat.rubricVersion}</b><span>rubryka</span></div>`;

  const filters = document.getElementById('filters');
  const cats = ['all', ...new Set(cat.skills.map(s=>s.category))];
  filters.innerHTML = cats.map(c=>`<button class="chip${c==='all'?' on':''}" data-c="${c}">${c==='all'?'Wszystkie':labelOf(c)}</button>`).join('');
  filters.onclick = e => { const b=e.target.closest('.chip'); if(!b)return;
    active=b.dataset.c; [...filters.children].forEach(x=>x.classList.toggle('on',x===b)); render(); };

  const grid = document.getElementById('grid');
  function badge(g,l){ return `<div class="bwrap"><div class="b ${cls(g)}">${txt(g)}</div><div class="bl">${l}</div></div>`; }
  function render(){
    const list = cat.skills.filter(s=>active==='all'||s.category===active);
    grid.innerHTML = list.map(s=>`
      <div class="card ${s.kind==='fixture'?'fixture':''}">
        <div class="cat">${labelOf(s.category)}</div>
        <h3>${s.name}</h3>
        <div class="badges">
          ${badge(s.badges.security,'SEC')}${badge(s.badges.quality,'QUAL')}${badge(s.badges.hygiene,'HYG')}
        </div>
        <div class="tag">${s.tagline}</div>
        <ul class="hl">${s.highlights.map(h=>`<li><span class="st ${stCls(h.status)}">${h.check}</span>${h.summary}</li>`).join('')}</ul>
      </div>`).join('');
  }
  render();
  document.getElementById('foot').textContent =
    `Wygenerowano ${cat.generatedAt} · rubryka v${cat.rubricVersion} · tryb: ocena natywna w Claude Code (bez API key) · badge liczone deterministycznie w kodzie.`;
</script>
</body>
</html>
